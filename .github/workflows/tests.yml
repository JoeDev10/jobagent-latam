name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    name: Smoke tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    # Matriz: corre en varias versiones de Python en paralelo
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verificar instalación
        run: |
          python --version
          pip list | grep -E "pytest|pydantic|streamlit|groq"

      # Los smoke tests no hacen llamadas reales a Groq, pero Pydantic Settings
      # requiere que GROQ_API_KEY tenga un valor. Usamos un placeholder.
      - name: Ejecutar smoke tests
        env:
          GROQ_API_KEY: test_key_for_ci_only
          PYTHONUTF8: "1"
        run: |
          pytest -m smoke -v --tb=short

      # Tests unitarios y de integración (todos con mocks — sin red, sin browser)
      # Excluimos 'live' que requieren API keys reales o internet.
      - name: Ejecutar suite completa (unit + integration)
        env:
          GROQ_API_KEY: test_key_for_ci_only
          PYTHONUTF8: "1"
        run: |
          pytest -m "not live and not slow" -v --tb=short --ignore=tests/test_smoke.py

      - name: Generar reporte de cobertura
        env:
          GROQ_API_KEY: test_key_for_ci_only
          PYTHONUTF8: "1"
        run: |
          pytest -m "not live" --cov=core --cov=modules --cov-report=term-missing --cov-report=xml

      - name: Subir reporte de cobertura como artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30
