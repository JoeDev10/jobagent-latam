<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — JobAgent LATAM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="min-h-screen bg-slate-900 flex items-center justify-center px-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="w-12 h-12 rounded-2xl bg-violet-600 flex items-center justify-center mx-auto mb-3 shadow-lg shadow-violet-900/50">
        <svg class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
      </div>
      <h1 class="text-2xl font-black text-white">Admin Panel</h1>
      <p class="text-slate-400 text-sm mt-1">JobAgent LATAM</p>
    </div>

    <div class="bg-slate-800 rounded-2xl border border-slate-700 p-8">
      {% if error %}
      <div class="bg-red-900/50 border border-red-700 rounded-xl px-4 py-3 mb-5">
        <span class="text-red-300 text-sm">{{ error }}</span>
      </div>
      {% endif %}

      <form method="POST" action="/admin/login" class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-slate-300 mb-1.5">Clave de administrador</label>
          <input type="password" name="secret" required autocomplete="off"
            class="w-full px-4 py-3 rounded-xl border border-slate-600 bg-slate-700 focus:border-violet-500 focus:ring-2 focus:ring-violet-500/20 outline-none transition-all text-white placeholder-slate-500"
            placeholder="••••••••••••••••"/>
        </div>
        <button type="submit"
          class="w-full bg-violet-600 hover:bg-violet-700 text-white py-3 rounded-xl font-bold transition-colors">
          Entrar →
        </button>
      </form>
    </div>
  </div>
</body>
</html>
