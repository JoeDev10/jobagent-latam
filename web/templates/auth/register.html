<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Crear cuenta — VacantIA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="min-h-screen bg-slate-50 flex items-center justify-center px-4 py-12">

  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="flex items-center justify-center gap-2 mb-8">
      <a href="/" class="flex items-center gap-2">
        <div class="w-9 h-9 rounded-xl bg-violet-600 flex items-center justify-center shadow-lg shadow-violet-200">
          <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
        </div>
        <span class="font-bold text-slate-900 text-xl">Vacant<span class="text-violet-600">IA</span></span>
      </a>
    </div>

    <div class="bg-white rounded-2xl shadow-xl shadow-slate-200/50 border border-slate-100 p-8">
      <h1 class="text-2xl font-black text-slate-900 mb-1">Creá tu cuenta gratis</h1>
      <p class="text-slate-400 text-sm mb-6">Sin tarjeta de crédito. Listo en 2 minutos.</p>

      {% if error %}
      <div class="bg-red-50 border border-red-200 rounded-xl px-4 py-3 mb-5 flex items-center gap-3">
        <svg class="w-5 h-5 text-red-500 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        <span class="text-red-700 text-sm font-medium">{{ error }}</span>
      </div>
      {% endif %}

      <form method="POST" action="/register" class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">Nombre completo</label>
          <input type="text" name="full_name" required autocomplete="name"
            class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-violet-500 focus:ring-2 focus:ring-violet-100 outline-none transition-all text-slate-900 placeholder-slate-300"
            placeholder="Ej: Marcelo Rodríguez"/>
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">Email</label>
          <input type="email" name="email" required autocomplete="email"
            class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-violet-500 focus:ring-2 focus:ring-violet-100 outline-none transition-all text-slate-900 placeholder-slate-300"
            placeholder="vos@ejemplo.com"/>
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">Contraseña</label>
          <input type="password" name="password" required autocomplete="new-password" minlength="8"
            class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-violet-500 focus:ring-2 focus:ring-violet-100 outline-none transition-all text-slate-900 placeholder-slate-300"
            placeholder="Mínimo 8 caracteres"/>
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">Repetir contraseña</label>
          <input type="password" name="password2" required autocomplete="new-password" minlength="8"
            class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-violet-500 focus:ring-2 focus:ring-violet-100 outline-none transition-all text-slate-900 placeholder-slate-300"
            placeholder="••••••••"/>
        </div>

        <div class="bg-violet-50 rounded-xl p-4 flex gap-3">
          <svg class="w-5 h-5 text-violet-500 flex-shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
          <p class="text-xs text-violet-700">Tus credenciales de portales se guardan <strong>encriptadas</strong> y nunca las compartimos con terceros.</p>
        </div>

        <button type="submit"
          class="w-full bg-violet-600 hover:bg-violet-700 text-white py-3 rounded-xl font-bold transition-colors shadow-lg shadow-violet-200">
          Crear cuenta gratis →
        </button>
      </form>

      <div class="mt-6 text-center text-sm text-slate-400">
        ¿Ya tenés cuenta?
        <a href="/login" class="text-violet-600 hover:text-violet-700 font-semibold ml-1">Iniciar sesión</a>
      </div>
    </div>
    <p class="text-center text-xs text-slate-300 mt-6">© 2026 VacantIA</p>
  </div>
</body>
</html>
