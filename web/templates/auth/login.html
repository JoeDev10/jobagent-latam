<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Iniciar sesión — JobAgent LATAM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="min-h-screen bg-slate-50 flex items-center justify-center px-4">

  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="flex items-center justify-center gap-2 mb-8">
      <a href="/" class="flex items-center gap-2">
        <div class="w-9 h-9 rounded-xl bg-violet-600 flex items-center justify-center shadow-lg shadow-violet-200">
          <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
        </div>
        <span class="font-bold text-slate-900 text-xl">JobAgent <span class="text-violet-600">LATAM</span></span>
      </a>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-xl shadow-slate-200/50 border border-slate-100 p-8">
      <h1 class="text-2xl font-black text-slate-900 mb-1">Bienvenido de vuelta</h1>
      <p class="text-slate-400 text-sm mb-6">Ingresá con tu cuenta para continuar.</p>

      {% if error %}
      <div class="bg-red-50 border border-red-200 rounded-xl px-4 py-3 mb-5 flex items-center gap-3">
        <svg class="w-5 h-5 text-red-500 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        <span class="text-red-700 text-sm font-medium">{{ error }}</span>
      </div>
      {% endif %}

      <form method="POST" action="/login" class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">Email</label>
          <input type="email" name="email" required autocomplete="email"
            class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-violet-500 focus:ring-2 focus:ring-violet-100 outline-none transition-all text-slate-900 placeholder-slate-300"
            placeholder="vos@ejemplo.com"/>
        </div>
        <div>
          <div class="flex items-center justify-between mb-1.5">
            <label class="block text-sm font-semibold text-slate-700">Contraseña</label>
          </div>
          <input type="password" name="password" required autocomplete="current-password"
            class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-violet-500 focus:ring-2 focus:ring-violet-100 outline-none transition-all text-slate-900 placeholder-slate-300"
            placeholder="••••••••"/>
        </div>
        <button type="submit"
          class="w-full bg-violet-600 hover:bg-violet-700 text-white py-3 rounded-xl font-bold transition-colors shadow-lg shadow-violet-200 mt-2">
          Iniciar sesión →
        </button>
      </form>

      <div class="mt-6 text-center text-sm text-slate-400">
        ¿No tenés cuenta?
        <a href="/register" class="text-violet-600 hover:text-violet-700 font-semibold ml-1">Registrate gratis</a>
      </div>
    </div>

    <p class="text-center text-xs text-slate-300 mt-6">© 2026 JobAgent LATAM</p>
  </div>
</body>
</html>
