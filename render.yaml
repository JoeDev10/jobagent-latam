services:
  - type: web
    name: jobagent-latam
    runtime: docker
    plan: starter
    healthCheckPath: /
    disk:
      name: vacantia-data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_SECRET
        generateValue: true
      - key: DATA_DIR
        value: /app/data
      - key: PORT
        value: 10000
      - key: FREE_RUNS_LIMIT
        value: "3"
      - key: GROQ_API_KEY
        sync: false
      - key: MP_CHECKOUT_URL
        sync: false
      - key: SUPPORT_WHATSAPP
        sync: false
      - key: SUPPORT_EMAIL
        sync: false
