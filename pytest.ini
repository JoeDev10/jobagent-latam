[pytest]
# Dónde busca tests
testpaths = tests

# pytest-asyncio: marca todos los tests async automáticamente
asyncio_mode = auto

# Patrón de archivos y funciones de test
python_files = test_*.py
python_functions = test_*

# Markers personalizados — permiten filtrar tests por categoría
# Uso: pytest -m smoke    (solo smoke)
#      pytest -m "not slow" (todo menos los lentos)
markers =
    smoke: tests rápidos que verifican que la app arranca (< 10s)
    unit: tests unitarios de funciones puras (sin red, sin DB persistente)
    integration: tests que tocan DB, archivos o módulos enteros
    slow: tests que tardan más de 5 segundos
    live: tests que requieren internet o API keys reales (NO corren en CI)
    asyncio: tests async (manejados por pytest-asyncio)

# Output más legible
addopts = -v --tb=short --strict-markers
